# SeqGAN V2 configuration
# Composite reward: OWASP CRS + Custom rules + AST diversity + DB execution
# vocab_size=89 (data/v2/tokenizer_vocab.json), num_attack_types=4

# Model
vocab_size: 89
embed_dim: 256
hidden_dim: 512
num_layers: 3
dropout: 0.2

# Conditional embedding (4 types: error_based=0, boolean_blind=1, time_blind=2, union_based=3)
use_conditional: true
num_attack_types: 4
type_embed_dim: 32

# Discriminator
d_embed_dim: 128
d_kernel_sizes: [3, 4, 5]
d_filters: 128

# Training
batch_size: 64
max_seq_len: 80
mc_rollout_k: 16
d_per_g_ratio: 1

# Phase steps
mle_epochs: 10
warmup_steps: 2000
adversarial_steps: 13000
refinement_steps: 5000

# Learning rates
lr_mle: 0.001
lr_g_warmup: 0.0001
lr_g_adversarial: 0.00005
lr_g_refinement: 0.00001
lr_d: 0.0001

# Optimizer
beta1: 0.5
beta2: 0.999
grad_clip: 1.0

# Reward
boundary_threshold: 5
use_waf: true
waf_url: "http://localhost:8080"
cache_size: 100000

# Paths (relative to project root C:\Users\Admin\Documents\GAN_SQLi)
data_dir: "SeqGAN_SQLi/data/v2"
ckpt_dir: "SeqGAN_SQLi/checkpoints/v2"
log_dir: "SeqGAN_SQLi/logs/v2"

# Eval
seed: 42
n_eval_samples: 1000
relex_dict_path: "SeqGAN_SQLi/data/relex_dictionary.json"
