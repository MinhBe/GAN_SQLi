model:
  embed_dim: 256
  hidden_dim: 512
  num_layers: 2
  dropout: 0.2
  max_len: 80
  use_bilstm: true
  enc_layers: 2
  num_attack_types: 14
  type_embed_dim: 64

pretrain:
  epochs: 50
  lr: 1.0e-3
  batch_size: 64
  expert_weight: 3.0
  scheduled_sampling_steps: 5000
  grad_clip: 1.0
  patience: 10
  seed: 42
