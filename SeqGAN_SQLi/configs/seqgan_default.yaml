model:
  embed_dim: 128
  hidden_dim: 512
  num_layers: 3
  dropout: 0.2
  max_len: 80

discriminator:
  embed_dim: 128
  kernel_sizes: [3, 4, 5]
  num_filters: 128

pretrain:
  epochs: 10
  lr: 1.0e-3
  batch_size: 64
  expert_weight: 3.0
  scheduled_sampling_steps: 5000
  grad_clip: 1.0
  patience: 3
  seed: 42

adversarial:
  total_steps: 50000
  lr_g: 1.0e-4
  lr_d: 1.0e-4
  batch_size: 64
  mc_rollout_k: 16
  d_steps_per_g: 5
  gp_lambda: 10.0
  baseline_ema_decay: 0.95
  grad_clip: 1.0
  seed: 42
  log_every: 100
  eval_every: 1000
  save_every: 5000
  syntax_check_step: 5000
  syntax_rate_threshold: 0.5
  lambda_syntax_boosted: 0.4

reward:
  lambda_d: 0.3
  lambda_bypass: 0.5
  lambda_syntax: 0.2
  length_penalty_coef: 0.01
